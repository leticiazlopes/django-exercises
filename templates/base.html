<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Projeto{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoA6DQDk9Q4u5asJ5MQ1zWZik6pfa6d5d5d5d5d5d5d5d5d" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }
        header nav {
            background: #0d6efd;
            color: #fff;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        header nav h1 {
            margin: 0;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        footer {
            background: #212529;
            color: #fff;
            text-align: center;
            padding: 1rem 0;
            margin-top: 3rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <h1>Meu Projeto</h1>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 Meu Projeto. Todos os direitos reservados.</p>
    </footer>

    <!-- Bootstrap JS (opcional, para componentes interativos) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-p5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m5m" crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
