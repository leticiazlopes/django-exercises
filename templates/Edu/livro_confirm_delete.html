{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h2 class="h4 mb-0">Deletar Livro</h2>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning mb-4">
                        <p>Tem certeza que deseja deletar o livro <strong>"{{ livro.titulo }}"</strong>?</p>
                        <p>Esta ação não pode ser desfeita.</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-danger me-2">Deletar</button>
                            <a href="{% url 'edu:livro_list' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
