{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h2 class="h4 mb-0">{% if livro %}Editar{% else %}Criar{% endif %} Livro</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-success me-2">Salvar</button>
                            <a href="{% url 'edu:livro_list' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                    {% if form.errors %}
                    <div class="alert alert-danger mt-3">
                        <h5 class="mb-2">Erros no formulário:</h5>
                        {{ form.errors }}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
